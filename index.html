<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendetta</title>
<style>
@font-face{font-family:'Roboto';src:url('fonts/Roboto-Regular.ttf') format('truetype');font-weight:400}
@font-face{font-family:'Roboto';src:url('fonts/Roboto-Bold.ttf') format('truetype');font-weight:700}
@font-face{font-family:'Roboto';src:url('fonts/Roboto-Black.ttf') format('truetype');font-weight:900}
@font-face{font-family:'Roboto';src:url('fonts/Roboto-Light.ttf') format('truetype');font-weight:300}
@font-face{font-family:'Roboto';src:url('fonts/Roboto-Medium.ttf') format('truetype');font-weight:500}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:'Roboto',sans-serif;color:#fff}
canvas#pc{display:block;position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;transition:opacity 0.8s ease}
canvas#pc.fade-out{opacity:0;pointer-events:none}
canvas#particles{display:block;position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none}

.panel{position:fixed;top:0;left:0;width:50%;height:100%;z-index:1;display:flex;flex-direction:column;justify-content:center;padding:40px 60px}
.panel.hidden{display:none !important}
.title{font-weight:900;font-size:clamp(20px,3.5vw,36px);line-height:1.3;letter-spacing:-0.5px;margin-bottom:50px;color:rgba(255,255,255,0.9)}
.fields{display:flex;flex-direction:column;gap:24px;max-width:340px}
.field{position:relative}
.field input{width:100%;background:none;border:none;padding:12px 0 10px;color:#fff;font-family:'Roboto',sans-serif;font-weight:400;font-size:15px;letter-spacing:0.5px;outline:none}
.field input::placeholder{color:rgba(255,255,255,0.25);font-weight:300;letter-spacing:1px}
.btn-row{display:flex;gap:12px;margin-top:36px}
.btn{width:160px;height:48px;border-radius:24px;border:none;background:#fff;color:#000;font-family:'Roboto',sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;cursor:pointer;transition:transform 0.2s}
.btn:hover{transform:scale(1.04)}.btn:active{transform:scale(0.97)}
.btn-dark{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6)}

.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(255,255,255,0.95);color:#000;font-family:'Roboto',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;padding:14px 36px;border-radius:24px;z-index:50;opacity:0;transition:all 0.4s ease;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:rgba(255,60,60,0.9);color:#fff}

#avatar-btn{position:fixed;top:28px;right:28px;z-index:25;width:52px;height:52px;border-radius:50%;overflow:hidden;border:1px solid rgba(255,255,255,0.1);cursor:pointer;transition:transform 0.2s;background:rgba(255,255,255,0.06);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
#avatar-btn img{width:100%;height:100%;object-fit:cover}
#top-search{display:none;position:fixed;top:30px;left:84px;z-index:25;width:350px;height:40px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.06);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:#fff;font-family:'Roboto',sans-serif;font-weight:300;font-size:14px;padding:0 14px 0 42px;outline:none;transition:background 0.2s}
#top-search::placeholder{color:rgba(255,255,255,0.25)}
#top-search:focus{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.14)}
#top-search-icon{display:none;position:fixed;top:42px;left:96px;z-index:26;pointer-events:none}
#top-search-icon svg{width:16px;height:16px;stroke:rgba(255,255,255,0.25);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

.profile-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:30;display:none;background:rgba(0,0,0,0.92);justify-content:center;align-items:center}
.profile-overlay.open{display:flex}
.profile-card{width:min(440px,90vw);background:#0a0a0a;border-radius:20px;overflow:hidden;max-height:90vh;overflow-y:auto}
.profile-banner{width:100%;height:140px;background:#161616;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden}
.profile-banner img{width:100%;height:100%;object-fit:cover}
.profile-banner .banner-placeholder{color:rgba(255,255,255,0.15);font-weight:300;font-size:13px}
.profile-banner input{display:none}
.profile-body{padding:0 28px 28px}
.profile-avatar-wrap{width:80px;height:80px;border-radius:50%;overflow:hidden;margin-top:-40px;position:relative;cursor:pointer}
.profile-avatar-wrap img{width:100%;height:100%;object-fit:cover}
.profile-avatar-wrap input{display:none}
.profile-login{font-weight:900;font-size:20px;margin-top:14px}
.profile-desc textarea{width:100%;background:rgba(255,255,255,0.03);border:none;border-radius:12px;color:#fff;font-family:'Roboto',sans-serif;font-weight:300;font-size:14px;padding:12px 14px;outline:none;resize:none}
.profile-desc textarea::placeholder{color:rgba(255,255,255,0.2)}
.profile-actions{display:flex;justify-content:flex-end;margin-top:24px;gap:12px}
.profile-actions button{padding:10px 28px;border-radius:20px;border:none;font-family:'Roboto',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:transform 0.2s}
.profile-actions button:active{transform:scale(0.95)}
.profile-actions .save-btn{background:#fff;color:#000}
.profile-actions .close-btn{background:none;color:rgba(255,255,255,0.4)}
.profile-actions .del-btn{background:rgba(255,60,60,0.15);color:rgba(255,80,80,0.9)}

#mobile-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;background:#000;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
#mobile-overlay .mo-title{font-weight:900;font-size:24px;margin-bottom:16px}
#mobile-overlay .mo-text{font-weight:300;font-size:14px;color:rgba(255,255,255,0.4);line-height:1.6;max-width:320px}

#hamburger{display:none;position:fixed;top:28px;left:28px;z-index:25;width:44px;height:44px;cursor:pointer;flex-direction:column;justify-content:center;align-items:center;gap:5px;border-radius:14px;transition:background 0.2s;background:rgba(255,255,255,0.06);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.08)}
#hamburger:hover{background:rgba(255,255,255,0.08)}
#hamburger span{display:block;width:22px;height:2px;background:rgba(255,255,255,0.7);border-radius:1px;transition:all 0.3s}
#hamburger.active span:nth-child(1){transform:translateY(7px) rotate(45deg)}
#hamburger.active span:nth-child(2){opacity:0}
#hamburger.active span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

.sidebar-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:35;display:none;background:rgba(0,0,0,0.4)}
.sidebar-overlay.open{display:block}
.sidebar{position:fixed;top:0;left:0;width:280px;height:100%;z-index:40;background:#111;transform:translateX(-100%);transition:transform 0.3s ease;display:flex;flex-direction:column}
.sidebar.open{transform:translateX(0)}
.sidebar-items{display:flex;flex-direction:column;padding:20px 0;flex:1}
.sidebar-item{display:flex;align-items:center;gap:14px;padding:14px 28px;cursor:pointer;transition:background 0.15s;color:rgba(255,255,255,0.5);font-weight:500;font-size:14px}
.sidebar-item:hover{background:rgba(255,255,255,0.04);color:#fff}
.sidebar-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.sidebar-item.logout{color:rgba(255,60,60,0.5)}
.sidebar-item.logout:hover{background:rgba(255,60,60,0.06);color:rgba(255,60,60,0.9)}

.search-panel{position:fixed;top:0;left:0;width:100%;height:100%;z-index:45;display:none;background:rgba(0,0,0,0.94);flex-direction:column;align-items:center;padding-top:80px}
.search-panel.open{display:flex}
.search-panel .search-wrap{width:min(460px,90vw);position:relative}
.search-panel .search-wrap input{width:100%;background:rgba(255,255,255,0.05);border:none;border-radius:28px;padding:14px 20px 14px 46px;color:#fff;font-family:'Roboto',sans-serif;font-weight:300;font-size:15px;outline:none}
.search-panel .search-wrap input::placeholder{color:rgba(255,255,255,0.2)}
.search-panel .search-wrap svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:rgba(255,255,255,0.25);fill:none;stroke-width:1.5}
.search-panel .search-close{position:absolute;top:28px;right:28px;width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,0.04);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.search-panel .search-close:hover{background:rgba(255,255,255,0.08)}
.search-panel .search-close svg{width:18px;height:18px;stroke:rgba(255,255,255,0.4);fill:none;stroke-width:1.5}
.search-results{width:min(460px,90vw);margin-top:12px;display:flex;flex-direction:column;gap:2px;max-height:60vh;overflow-y:auto}
.search-user{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:14px;cursor:pointer;transition:background 0.15s}
.search-user:hover{background:rgba(255,255,255,0.04)}
.search-user img{width:36px;height:36px;border-radius:50%;object-fit:cover;background:#1a1a1a}
.search-user .su-info{display:flex;flex-direction:column;gap:1px}
.search-user .su-login{font-weight:600;font-size:14px}
.search-user .su-desc{font-weight:300;font-size:12px;color:rgba(255,255,255,0.25)}
.search-empty{color:rgba(255,255,255,0.15);font-weight:300;font-size:14px;text-align:center;padding:40px 0}

.topic-result{padding:12px 14px;border-radius:14px;cursor:pointer;transition:background 0.15s}
.topic-result:hover{background:rgba(255,255,255,0.04)}
.topic-result .tr-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.topic-result .tr-user{font-weight:600;font-size:13px}
.topic-result .tr-cat{font-size:10px;color:rgba(255,255,255,0.2);padding:2px 8px;background:rgba(255,255,255,0.04);border-radius:8px}
.topic-result .tr-title{font-weight:700;font-size:15px}
.topic-result .tr-text{font-weight:300;font-size:12px;color:rgba(255,255,255,0.3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

.profile-view-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:32;display:none;background:rgba(0,0,0,0.92);justify-content:center;align-items:center}
.profile-view-overlay.open{display:flex}
.pv-stats{margin-top:16px}
.pv-stats-inner{display:flex;gap:16px}
.pv-stat{font-weight:300;font-size:13px;color:rgba(255,255,255,0.35)}
.pv-stat b{font-weight:700;color:rgba(255,255,255,0.6)}
.pv-posts{margin-top:20px;display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto;padding-bottom:8px}
.pv-posts-title{font-weight:700;font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:4px}
.pv-post{background:rgba(255,255,255,0.03);border-radius:10px;padding:12px 14px}
.pv-post-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pv-post-title{font-weight:600;font-size:13px}
.pv-post-cat{font-size:10px;color:rgba(255,255,255,0.2);padding:2px 8px;background:rgba(255,255,255,0.04);border-radius:8px}
.pv-status{font-size:10px;padding:2px 8px;border-radius:8px;margin-left:auto}
.pv-status.approved{background:rgba(80,200,120,0.1);color:rgba(80,200,120,0.7)}
.pv-status.pending{background:rgba(255,200,60,0.1);color:rgba(255,200,60,0.7)}
.pv-status.rejected{background:rgba(255,60,60,0.1);color:rgba(255,80,80,0.7)}
.pv-post-text{font-weight:300;font-size:12px;color:rgba(255,255,255,0.3);margin-top:6px;line-height:1.4}

.full-panel{position:fixed;top:0;left:0;width:100%;height:100%;z-index:45;display:none;background:#080808;flex-direction:column;align-items:center;overflow-y:auto}
.full-panel.open{display:flex}
.full-panel .fp-close{position:fixed;top:28px;right:28px;z-index:2;width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,0.04);cursor:pointer;display:flex;align-items:center;justify-content:center}
.full-panel .fp-close:hover{background:rgba(255,255,255,0.08)}
.full-panel .fp-close svg{width:18px;height:18px;stroke:rgba(255,255,255,0.4);fill:none;stroke-width:1.5}
.full-panel .fp-title{font-weight:900;font-size:22px;margin:60px 0 24px}
.full-panel .fp-content{width:min(600px,90vw);padding-bottom:60px}

.feed{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;display:none;overflow-y:auto;padding:80px 20px 40px}
.feed.open{display:block}
.feed-inner{width:min(640px,100%);margin:0 auto;display:flex;flex-direction:column;gap:16px}

.post-card{background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:20px;transition:all 0.15s;cursor:pointer}
.post-card:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.1)}
.post-card .pc-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.post-card .pc-head img{width:32px;height:32px;border-radius:50%;object-fit:cover;background:#1a1a1a;cursor:pointer}
.post-card .pc-head .pc-user{font-weight:600;font-size:13px;cursor:pointer}
.post-card .pc-head img:hover,.post-card .pc-head .pc-user:hover{opacity:0.7}
.post-card .pc-head .pc-cat{font-size:11px;color:rgba(255,255,255,0.2);margin-left:auto;padding:3px 10px;background:rgba(255,255,255,0.04);border-radius:10px}
.post-card .pc-title{font-weight:700;font-size:16px;margin-bottom:8px}
.post-card .pc-text{font-weight:300;font-size:13px;color:rgba(255,255,255,0.6);line-height:1.6;white-space:pre-wrap;word-break:break-word}
.post-card .pc-text a{color:rgba(100,160,255,0.8);text-decoration:none}
.post-card .pc-text a:hover{text-decoration:underline}
.post-card .pc-media{margin-top:12px;border-radius:12px;max-width:100%;max-height:400px;object-fit:cover;cursor:pointer;display:none}
.post-card .pc-media.visible{display:block}
.post-card .pc-media-load{display:inline-block;margin-top:10px;padding:6px 14px;border-radius:10px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.35);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s}
.post-card .pc-media-load:hover{background:rgba(255,255,255,0.1);color:#fff}
.post-card .pc-time{font-size:11px;color:rgba(255,255,255,0.12);margin-top:10px}
.post-card .pc-reject{margin-top:10px;padding:10px 14px;background:rgba(255,60,60,0.08);border-radius:10px;font-size:12px;color:rgba(255,100,100,0.8)}

.create-form{display:flex;flex-direction:column;gap:16px}
.create-form label{font-weight:500;font-size:13px;color:rgba(255,255,255,0.4)}
.create-form input[type=text],.create-form textarea{width:100%;background:rgba(255,255,255,0.04);border:none;border-radius:12px;padding:12px 14px;color:#fff;font-family:'Roboto',sans-serif;font-weight:300;font-size:14px;outline:none;resize:none}
.create-form input::placeholder,.create-form textarea::placeholder{color:rgba(255,255,255,0.2)}
.create-form .cat-btns{display:flex;gap:8px}
.create-form .cat-btn{flex:1;padding:12px;border-radius:12px;border:none;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);font-family:'Roboto',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all 0.15s}
.create-form .cat-btn.active{background:rgba(255,255,255,0.1);color:#fff}
.create-form .cat-btn:hover{background:rgba(255,255,255,0.08)}
.create-form .file-row{display:flex;gap:8px;align-items:center}
.create-form .file-row button{padding:10px 18px;border-radius:12px;border:none;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);font-size:12px;font-family:'Roboto',sans-serif;cursor:pointer;transition:all 0.15s}
.create-form .file-row button:hover{background:rgba(255,255,255,0.1);color:#fff}
.create-form .file-row input{display:none}
.create-form .file-list{font-size:12px;color:rgba(255,255,255,0.25);margin-top:4px}
.create-form .submit-btn{padding:14px;border-radius:14px;border:none;background:#fff;color:#000;font-family:'Roboto',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:transform 0.2s;margin-top:8px}
.create-form .submit-btn:active{transform:scale(0.97)}
.create-form .submit-btn:disabled{opacity:0.4;cursor:default}

.admin-card{background:rgba(255,255,255,0.03);border-radius:12px;padding:14px 16px}
.admin-card .ac-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;gap:8px;flex-wrap:wrap}
.admin-card .ac-label{font-weight:600;font-size:13px}
.admin-card .ac-sub{font-size:12px;color:rgba(255,255,255,0.3);font-weight:300;margin-top:4px}
.admin-card .ac-btn{padding:6px 14px;border-radius:10px;border:none;font-size:11px;font-family:'Roboto',sans-serif;font-weight:600;cursor:pointer;transition:all 0.15s}
.admin-card .ac-btn:hover{opacity:0.8}
.ac-btn.green{background:rgba(80,200,120,0.15);color:rgba(80,200,120,0.9)}
.ac-btn.red{background:rgba(255,60,60,0.1);color:rgba(255,80,80,0.8)}
.ac-btn.blue{background:rgba(100,160,255,0.1);color:rgba(100,160,255,0.8)}
.ac-btn.gray{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4)}
.admin-tabs{display:flex;gap:6px;margin-bottom:20px}
.admin-tabs button{padding:8px 16px;border-radius:10px;border:none;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);font-size:12px;font-family:'Roboto',sans-serif;font-weight:600;cursor:pointer;transition:all 0.15s}
.admin-tabs button.active{background:rgba(255,255,255,0.1);color:#fff}

.post-view{position:fixed;top:0;left:0;width:100%;height:100%;z-index:46;display:none;background:#080808;flex-direction:column;align-items:center;overflow-y:auto}
.post-view.open{display:flex}
.post-view .pv-head{width:min(640px,90vw);margin-top:60px;display:flex;align-items:center;gap:10px}
.post-view .pv-head img{width:36px;height:36px;border-radius:50%;object-fit:cover;background:#1a1a1a;cursor:pointer}
.post-view .pv-head .pv-author{font-weight:600;font-size:14px;cursor:pointer}
.post-view .pv-head .pv-author:hover{opacity:0.7}
.post-view .pv-head .pv-cat{font-size:11px;color:rgba(255,255,255,0.2);margin-left:auto;padding:3px 10px;background:rgba(255,255,255,0.04);border-radius:10px}
.post-view .pv-body{width:min(640px,90vw);padding-bottom:40px}
.post-view .pv-title{font-weight:900;font-size:24px;margin:20px 0 16px;line-height:1.3}
.post-view .pv-text{font-weight:300;font-size:14px;color:rgba(255,255,255,0.7);line-height:1.7;white-space:pre-wrap;word-break:break-word}
.post-view .pv-text a{color:rgba(100,160,255,0.8);text-decoration:none}
.post-view .pv-text a:hover{text-decoration:underline}
.post-view .pv-media{margin-top:16px;border-radius:12px;max-width:100%;max-height:500px;object-fit:cover}
.post-view .pv-media-load{display:inline-block;margin-top:12px;padding:8px 18px;border-radius:12px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.35);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s}
.post-view .pv-media-load:hover{background:rgba(255,255,255,0.1);color:#fff}
.post-view .pv-meta{display:flex;gap:16px;margin-top:16px;font-size:12px;color:rgba(255,255,255,0.2)}
.post-view .pv-close{position:fixed;top:28px;right:28px;z-index:2;width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,0.04);cursor:pointer;display:flex;align-items:center;justify-content:center}
.post-view .pv-close:hover{background:rgba(255,255,255,0.08)}
.post-view .pv-close svg{width:18px;height:18px;stroke:rgba(255,255,255,0.4);fill:none;stroke-width:1.5}
.post-view .pv-comments{width:min(640px,90vw);border-top:1px solid rgba(255,255,255,0.06);padding-top:20px;margin-top:20px;padding-bottom:60px}
.post-view .pv-comments-title{font-weight:700;font-size:14px;color:rgba(255,255,255,0.4);margin-bottom:16px}
.post-view .pv-comment{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.post-view .pv-comment img{width:28px;height:28px;border-radius:50%;object-fit:cover;background:#1a1a1a;flex-shrink:0}

<script>
(function(){
  var c=document.getElementById('particles'),ctx=c.getContext('2d'),W,H;
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
  resize();window.addEventListener('resize',resize);
  var pts=[];for(var i=0;i<120;i++)pts.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*2+0.5,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,a:Math.random()*0.5+0.15,ph:Math.random()*Math.PI*2});
  var comets=[];for(var i=0;i<4;i++){var angle=Math.random()*Math.PI*2,sp=Math.random()*0.4+0.15;comets.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:Math.cos(angle)*sp,vy:Math.sin(angle)*sp,len:Math.random()*60+40,r:Math.random()*1.5+0.5,a:Math.random()*0.4+0.3,ph:Math.random()*Math.PI*2})}
  function draw(){ctx.clearRect(0,0,W,H);var t=Date.now()*0.001;for(var i=0;i<pts.length;i++){var p=pts[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+p.a*(0.5+0.5*Math.sin(t+p.ph))+')';ctx.fill()}
  for(var i=0;i<comets.length;i++){var cm=comets[i];cm.x+=cm.vx;cm.y+=cm.vy;if(cm.x<-100)cm.x=W+50;if(cm.x>W+100)cm.x=-50;if(cm.y<-100)cm.y=H+50;if(cm.y>H+100)cm.y=-50;var cal=cm.a*(0.6+0.4*Math.sin(t*0.8+cm.ph));var tx=cm.x-cm.vx/0.2*cm.len,ty=cm.y-cm.vy/0.2*cm.len;var g=ctx.createLinearGradient(cm.x,cm.y,tx,ty);g.addColorStop(0,'rgba(255,255,255,'+cal+')');g.addColorStop(1,'rgba(255,255,255,0)');ctx.beginPath();ctx.moveTo(cm.x,cm.y);ctx.lineTo(tx,ty);ctx.strokeStyle=g;ctx.lineWidth=cm.r;ctx.stroke();ctx.beginPath();ctx.arc(cm.x,cm.y,cm.r*1.5,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+cal+')';ctx.fill()}
  requestAnimationFrame(draw)}draw();
})();
</script>

<script>
(function(){
var API='/api';
var user=null,isAdmin=false,currentFiles=[],userCache={};
function api(url,opts){var o=opts||{};o.credentials='include';o.headers=o.headers||{};o.headers['Content-Type']='application/json';return fetch(API+url,o)}

function toast(m,err){var t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(err?' error':'');setTimeout(function(){t.className='toast'},2500)}
function logAction(a){if(!user)return;api('/logs',{method:'POST',body:JSON.stringify({action:a,device:navigator.userAgent.substring(0,80)})}).catch(function(){})}

function fetchUsers(ids,callback){
  if(!ids.length){callback({});return}
  var unique=[];for(var i=0;i<ids.length;i++){if(ids[i]&&!userCache[ids[i]])unique.push(ids[i])}
  if(!unique.length){var out={};for(var i=0;i<ids.length;i++)out[ids[i]]=userCache[ids[i]]||null;callback(out);return}
  var done=0,total=unique.length;
  function checkDone(){done++;if(done===total){var out={};for(var i=0;i<ids.length;i++)out[ids[i]]=userCache[ids[i]]||null;callback(out)}}
  for(var i=0;i<unique.length;i++){(function(uid){
    api('/users/'+uid).then(function(r){return r.json()}).then(function(u){userCache[u.id]=u}).catch(function(){}).finally(checkDone);
  })(unique[i])}
}

function enterApp(u){
  user=u;
  if(u.isAdmin){isAdmin=true;document.getElementById('sidebar-admin').style.display='flex'}
  document.getElementById('panel').classList.add('hidden');
  document.getElementById('pc').classList.add('fade-out');
  document.getElementById('avatar-btn').style.display='block';
  document.getElementById('hamburger').style.display='flex';
  document.getElementById('top-search').style.display='block';
  document.getElementById('top-search-icon').style.display='block';
  document.getElementById('feed').classList.add('open');
  document.getElementById('profile-login').textContent=u.login;
  userCache[u.id]=u;
  checkAdmin();loadFeed();logAction('login');
  api('/users/'+u.id).then(function(r){return r.json()}).then(function(u2){
    if(u2){user=u2;userCache[u2.id]=u2;
      if(u2.avatar)document.getElementById('avatar-img').src=u2.avatar;
      if(u2.banner){document.getElementById('banner-img').src=u2.banner;document.getElementById('banner-img').style.display='block';document.getElementById('banner-text').style.display='none'}
      if(u2.description)document.getElementById('profile-desc-input').value=u2.description;
      if(u2.avatar)document.getElementById('profile-avatar-img').src=u2.avatar;
    }
  }).catch(function(){});
}

function checkAdmin(){api('/auth/me').then(function(r){return r.json()}).then(function(u){isAdmin=!!u.isAdmin;document.getElementById('sidebar-admin').style.display=isAdmin?'flex':'none'}).catch(function(){})}

function loadFeed(){
  api('/posts').then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(rows){
    var el=document.getElementById('feed-inner');
    if(!rows||!rows.length){el.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.15);font-weight:300;padding:60px 0">Пока нет постов</div>';return}
    var ids=[];for(var i=0;i<rows.length;i++)if(rows[i].user_id)ids.push(rows[i].user_id);
    fetchUsers(ids,function(uMap){
      el.innerHTML='';
      for(var i=0;i<rows.length;i++){rows[i]._user=uMap[rows[i].user_id]||null;el.appendChild(renderPost(rows[i]))}
    });
  }).catch(function(e){console.error(e);var el=document.getElementById('feed-inner');el.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.2);font-weight:300;padding:60px 0">Ошибка загрузки. <span style="cursor:pointer;text-decoration:underline" onclick="loadFeed()">Обновить</span></div>'});
}

function renderPost(p){
  var d=document.createElement('div');d.className='post-card';d.dataset.pid=p.id;
  var u=p._user||{};
  var av=u&&u.avatar&&u.avatar.indexOf('data:')===0?u.avatar:'default-avatar.jpg';
  var catLabel=p.category==='manual'?'Мануал':'Другое';
  var preview=(p.content||'').substring(0,120);
  if(preview.length<(p.content||'').length)preview+='...';
  preview=preview.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" onclick="event.stopPropagation()">$1</a>');
  var time=p.created_at?new Date(p.created_at).toLocaleString('ru'):'';
  var reject='';
  if(p.status==='rejected'&&p.reject_reason)reject='<div class="pc-reject">Отклонено: '+p.reject_reason+'</div>';
  d.innerHTML='<div class="pc-head"><img src="'+av+'" alt="" data-uid="'+(u.id||0)+'"><span class="pc-user" data-uid="'+(u.id||0)+'">'+(u.login||'?')+'</span><span class="pc-cat">'+catLabel+'</span></div><div class="pc-title">'+(p.title||'')+'</div><div class="pc-text">'+preview+'</div><div class="pc-time">'+time+'</div>'+reject;
  var clickables=d.querySelectorAll('[data-uid]');
  for(var i=0;i<clickables.length;i++){clickables[i].addEventListener('click',function(e){e.stopPropagation();var uid=parseInt(this.dataset.uid);if(uid)openUserProfile(uid)})}
  d.addEventListener('click',function(e){if(e.target.closest('[data-uid]'))return;openPostView(p.id)});
  return d;
}

var busy=false;
function setBusy(v){busy=v;document.getElementById('login-btn').disabled=v;document.getElementById('reg-btn').disabled=v;document.getElementById('login-btn').textContent=v?'...':'Вход';document.getElementById('reg-btn').textContent=v?'...':'Регистрация';document.getElementById('login-btn').style.opacity=v?'0.5':'1';document.getElementById('reg-btn').style.opacity=v?'0.5':'1'}

function tryLogin(lg,pw){
  api('/auth/login',{method:'POST',body:JSON.stringify({login:lg,password:pw})})
  .then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d}})})
  .then(function(r){
    if(!r.ok){toast(r.data.error==='banned'?'Вы забанены: '+(r.data.reason||''):(r.data.error||'Ошибка'),true);setBusy(false);return}
    toast('Успешно.');enterApp(r.data);setBusy(false);
  }).catch(function(){setBusy(false);toast('Ошибка соединения',true)});
}

function tryReg(lg,pw){
  api('/auth/register',{method:'POST',body:JSON.stringify({login:lg,password:pw})})
  .then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d}})})
  .then(function(r){
    if(!r.ok){toast(r.data.error||'Ошибка',true);setBusy(false);return}
    toast('Зарегистрирован!');enterApp(r.data);setBusy(false);
  }).catch(function(){setBusy(false);toast('Ошибка соединения',true)});
}

document.getElementById('login-btn').addEventListener('click',function(){
  if(busy)return;var lg=document.getElementById('login-input').value.trim(),pw=document.getElementById('password-input').value.trim();
  if(!lg||!pw){toast('Заполни все поля',true);return}setBusy(true);tryLogin(lg,pw);
});

document.getElementById('reg-btn').addEventListener('click',function(){
  if(busy)return;var lg=document.getElementById('login-input').value.trim(),pw=document.getElementById('password-input').value.trim();
  if(!lg||!pw){toast('Заполни все поля',true);return}setBusy(true);tryReg(lg,pw);
});

document.getElementById('avatar-btn').addEventListener('click',function(){document.getElementById('profile-overlay').classList.add('open')});
document.getElementById('profile-close').addEventListener('click',function(){document.getElementById('profile-overlay').classList.remove('open')});
document.getElementById('profile-overlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open')});
document.getElementById('avatar-wrap').addEventListener('click',function(){document.getElementById('avatar-input').click()});
document.getElementById('avatar-input').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){document.getElementById('profile-avatar-img').src=ev.target.result;document.getElementById('avatar-img').src=ev.target.result};r.readAsDataURL(f)});
document.getElementById('banner-wrap').addEventListener('click',function(){document.getElementById('banner-input').click()});
document.getElementById('banner-input').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){document.getElementById('banner-img').src=ev.target.result;document.getElementById('banner-img').style.display='block';document.getElementById('banner-text').style.display='none'};r.readAsDataURL(f)});

function resizeImage(src,maxW,maxH,quality,cb){var img=new Image();img.crossOrigin='anonymous';img.onload=function(){var w=img.width,h=img.height;if(w>maxW){h=h*maxW/w;w=maxW}if(h>maxH){w=w*maxH/h;h=maxH}var c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);var d=c.toDataURL('image/webp',quality);if(d.indexOf('webp')===-1)d=c.toDataURL('image/jpeg',quality);cb(d)};img.onerror=function(){cb(src)};img.src=src}

document.getElementById('profile-save').addEventListener('click',function(){
  if(!user)return;var desc=document.getElementById('profile-desc-input').value;
  var avatarSrc=document.getElementById('profile-avatar-img').src;
  var bannerSrc=document.getElementById('banner-img').style.display==='block'?document.getElementById('banner-img').src:'';
  function doSave(av,ba){api('/users/'+user.id,{method:'PATCH',body:JSON.stringify({description:desc,avatar:av||'',banner:ba||''})}).then(function(r){if(!r.ok)throw 0;user.description=desc;if(av)user.avatar=av;if(ba)user.banner=ba;userCache[user.id]=user;toast('Сохранено');document.getElementById('profile-overlay').classList.remove('open')}).catch(function(){toast('Ошибка',true)})}
  var done=0,avD='',baD='';function check(){done++;if(done===2)doSave(avD,baD)}
  if(avatarSrc&&avatarSrc.indexOf('default-avatar')===-1&&avatarSrc.indexOf('data:')===0)resizeImage(avatarSrc,120,120,0.75,function(d){avD=d;check()});else check();
  if(bannerSrc&&bannerSrc.indexOf('data:')===0)resizeImage(bannerSrc,600,200,0.75,function(d){baD=d;check()});else check();
});

function closeSidebar(){document.getElementById('hamburger').classList.remove('active');document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open')}

var searchTimer=null;
document.getElementById('search-input').addEventListener('input',function(){
  var q=this.value.trim(),res=document.getElementById('search-results');clearTimeout(searchTimer);
  if(!q){res.innerHTML='';return}
  searchTimer=setTimeout(function(){
    api('/users/search?q='+encodeURIComponent(q)).then(function(r){return r.json()}).then(function(rows){
      if(!rows||!rows.length){res.innerHTML='<div class="search-empty">Ничего не найдено</div>';return}
      var h='';for(var i=0;i<rows.length;i++){var u=rows[i];var av=u.avatar&&u.avatar.indexOf('data:')===0?u.avatar:'default-avatar.jpg';h+='<div class="search-user" data-uid="'+u.id+'"><img src="'+av+'" alt=""><div class="su-info"><span class="su-login">'+u.login+'</span><span class="su-desc">'+(u.description||'Нет описания')+'</span></div></div>'}
      res.innerHTML=h;
      var items=res.querySelectorAll('.search-user');
      for(var i=0;i<items.length;i++){items[i].addEventListener('click',function(){var uid=parseInt(this.dataset.uid);openUserProfile(uid)})}
    }).catch(function(){res.innerHTML='<div class="search-empty">Ошибка</div>'});
  },250);
});

var topicTimer=null;
document.getElementById('topic-search-input').addEventListener('input',function(){
  var q=this.value.trim(),res=document.getElementById('topic-search-results');clearTimeout(topicTimer);
  if(!q){res.innerHTML='';return}
  topicTimer=setTimeout(function(){
    api('/posts').then(function(r){return r.json()}).then(function(rows){
      var filtered=[];for(var i=0;i<rows.length;i++){if(rows[i].title&&rows[i].title.toLowerCase().indexOf(q.toLowerCase())!==-1)filtered.push(rows[i])}
      if(!filtered.length){res.innerHTML='<div class="search-empty">Тем не найдено</div>';return}
      var ids=[];for(var i=0;i<filtered.length;i++)if(filtered[i].user_id)ids.push(filtered[i].user_id);
      fetchUsers(ids,function(uMap){
        var h='';for(var i=0;i<filtered.length;i++){
          var p=filtered[i],u=uMap[p.user_id]||{};
          var catLabel=p.category==='manual'?'Мануал':'Другое';
          var preview=(p.content||'').substring(0,100);
          h+='<div class="topic-result" data-pid="'+p.id+'"><div class="tr-head"><span class="tr-user">'+(u.login||'?')+'</span><span class="tr-cat">'+catLabel+'</span></div><div class="tr-title">'+(p.title||'')+'</div><div class="tr-text">'+preview+'</div></div>';
        }
        res.innerHTML=h;
        var items=res.querySelectorAll('.topic-result');
        for(var i=0;i<items.length;i++){items[i].addEventListener('click',function(){var pid=parseInt(this.dataset.pid);document.getElementById('topic-search-panel').classList.remove('open');openPostView(pid)})}
      });
    }).catch(function(){res.innerHTML='<div class="search-empty">Ошибка</div>'});
  },250);
});

function openUserProfile(uid){
  api('/users/'+uid).then(function(r){return r.json()}).then(function(u){
    if(!u||!u.id)return;
    var isOwn=user&&u.id===user.id;
    var av=u.avatar&&u.avatar.indexOf('data:')===0?u.avatar:'default-avatar.jpg';
    var banner=u.banner&&u.banner.indexOf('data:')===0?u.banner:'';
    var card=document.getElementById('profile-view-card');
    if(!isOwn)api('/logs',{method:'POST',body:JSON.stringify({action:'view_profile',device:'view_profile:'+u.id})}).catch(function(){});
    var html='<div class="profile-banner" style="cursor:default">'+(banner?'<img src="'+banner+'" alt="">':'<span class="banner-placeholder">Баннер</span>')+'</div>';
    html+='<div class="profile-body"><div class="profile-avatar-wrap" style="cursor:default"><img src="'+av+'" alt=""></div>';
    html+='<div class="profile-login">'+u.login+'</div>';
    html+='<div class="profile-desc"><textarea rows="3" readonly style="cursor:default">'+(u.description||'Нет описания')+'</textarea></div>';
    html+='<div class="pv-posts" id="pv-posts-'+u.id+'"><div style="text-align:center;color:rgba(255,255,255,0.15);padding:20px 0;font-size:13px">Загрузка постов...</div></div>';
    html+='<div class="profile-actions">';
    if(isOwn){html+='<button class="close-btn" onclick="document.getElementById(\'profile-view-overlay\').classList.remove(\'open\')">Закрыть</button><button class="save-btn" onclick="document.getElementById(\'profile-view-overlay\').classList.remove(\'open\');document.getElementById(\'profile-overlay\').classList.add(\'open\')">Редактировать</button>'}
    else{html+='<button class="close-btn" onclick="document.getElementById(\'profile-view-overlay\').classList.remove(\'open\')">Закрыть</button>';if(isAdmin)html+='<button class="del-btn" onclick="adminDeleteUser('+u.id+',\''+u.login+'\')">Удалить</button>'}
    html+='</div></div>';
    card.innerHTML=html;
    document.getElementById('profile-view-overlay').classList.add('open');
    api('/posts/user/'+u.id).then(function(r){return r.json()}).then(function(posts){
      var el=document.getElementById('pv-posts-'+u.id);if(!el)return;
      if(!posts||!posts.length){el.innerHTML='';return}
      var h='<div class="pv-posts-title">Посты: '+posts.length+'</div>';
      for(var i=0;i<posts.length;i++){
        var p=posts[i];var catLabel=p.category==='manual'?'Мануал':'Другое';
        var statusLabel='';
        if(p.status==='approved')statusLabel='<span class="pv-status approved">Одобрено</span>';
        else if(p.status==='pending')statusLabel='<span class="pv-status pending">На модерации</span>';
        else if(p.status==='rejected')statusLabel='<span class="pv-status rejected">Отклонено</span>';
        var preview=(p.content||'').substring(0,80);if(preview.length<(p.content||'').length)preview+='...';
        h+='<div class="pv-post"><div class="pv-post-head"><span class="pv-post-title">'+(p.title||'')+'</span><span class="pv-post-cat">'+catLabel+'</span>'+statusLabel+'</div><div class="pv-post-text">'+preview+'</div></div>';
      }
      el.innerHTML=h;
    }).catch(function(){});
  }).catch(function(){toast('Ошибка',true)});
}

document.getElementById('profile-view-overlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open')});

var currentPostId=null,currentReplyTo=null;
function openPostView(pid){
  currentPostId=pid;currentReplyTo=null;
  api('/posts/'+pid).then(function(r){return r.json()}).then(function(p){
    if(!p||!p.id)return;
    fetchUsers([p.user_id],function(uMap){
      var u=uMap[p.user_id]||{};
      var av=u.avatar&&u.avatar.indexOf('data:')===0?u.avatar:'default-avatar.jpg';
      var catLabel=p.category==='manual'?'Мануал':'Другое';
      var time=p.created_at?new Date(p.created_at).toLocaleString('ru'):'';
      var head=document.getElementById('pv-head');
      head.innerHTML='<img src="'+av+'" alt="" onclick="event.stopPropagation();openUserProfile('+p.user_id+')"><span class="pv-author" onclick="event.stopPropagation();openUserProfile('+p.user_id+')">'+(u.login||'?')+'</span><span class="pv-cat">'+catLabel+'</span>';
      var body=document.getElementById('pv-body');
      var text=(p.content||'').replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>');
      var mediaHtml='';
      if(p.media){
        if(p.media_type&&p.media_type.indexOf('video')===0)mediaHtml='<div class="pv-media-load" onclick="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'">Показать видео</div><video class="pv-media" controls style="display:none" src="'+p.media+'"></video>';
        else if(p.media_type&&p.media_type.indexOf('audio')===0)mediaHtml='<audio class="pv-media" controls src="'+p.media+'"></audio>';
        else mediaHtml='<div class="pv-media-load" onclick="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'">Показать изображение</div><img class="pv-media" src="'+p.media+'" alt="" style="display:none">';
      }
      body.innerHTML='<div class="pv-title">'+(p.title||'')+'</div><div class="pv-text">'+text+'</div>'+mediaHtml+'<div class="pv-meta"><span>'+time+'</span></div>';
      document.getElementById('post-view').classList.add('open');
      document.getElementById('feed').style.display='none';
      api('/logs',{method:'POST',body:JSON.stringify({action:'view_post',device:''+pid})}).catch(function(){});
      loadComments(pid);
    });
  }).catch(function(){toast('Ошибка',true)});
}

document.getElementById('pv-close').addEventListener('click',function(){document.getElementById('post-view').classList.remove('open');document.getElementById('feed').style.display=''});

function loadComments(pid){
  api('/comments/'+pid).then(function(r){return r.json()}).then(function(rows){
    var el=document.getElementById('pv-comments');
    var userIds=[];for(var i=0;i<rows.length;i++)if(rows[i].user_id)userIds.push(rows[i].user_id);
    fetchUsers(userIds,function(uMap){
      var top=[];var childMap={};
      for(var i=0;i<rows.length;i++){
        if(rows[i].parent_id){if(!childMap[rows[i].parent_id])childMap[rows[i].parent_id]=[];childMap[rows[i].parent_id].push(rows[i])}
        else top.push(rows[i]);
      }
      var count=rows.length;
      var h='<div class="pv-comments-title">Комментарии: '+count+'</div>';
      h+='<div class="pv-replying" id="pv-replying"></div>';
      h+='<div class="pv-add-comment"><textarea id="pv-comment-input" rows="2" placeholder="Комментарий..."></textarea><button id="pv-comment-send">Отправить</button></div>';
      for(var i=0;i<top.length;i++)h+=renderComment(top[i],uMap,childMap);
      if(!top.length&&!count)h+='<div style="color:rgba(255,255,255,0.15);font-size:13px;padding:20px 0;text-align:center">Пока нет комментариев</div>';
      el.innerHTML=h;
      var sendBtn=document.getElementById('pv-comment-send');
      if(sendBtn)sendBtn.addEventListener('click',function(){submitComment(pid)});
    });
  }).catch(function(){});
}

function renderComment(c,uMap,childMap){
  var u=uMap[c.user_id]||{};
  var av=u.avatar&&u.avatar.indexOf('data:')===0?u.avatar:'default-avatar.jpg';
  var time=c.created_at?new Date(c.created_at).toLocaleString('ru'):'';
  var h='<div class="pv-comment" data-cid="'+c.id+'"><img src="'+av+'" alt=""><div class="pv-comment-body"><span class="pv-comment-user">'+(u.login||'?')+'</span><span class="pv-comment-time">'+time+'</span><div class="pv-comment-text">'+escapeHtml(c.content||'')+'</div><span class="pv-comment-reply" data-reply="'+c.id+'">Ответить</span></div></div>';
  if(childMap[c.id]){
    for(var i=0;i<childMap[c.id].length;i++){
      var ch=childMap[c.id][i];var cu=uMap[ch.user_id]||{};
      var cav=cu.avatar&&cu.avatar.indexOf('data:')===0?cu.avatar:'default-avatar.jpg';
      var ctime=ch.created_at?new Date(ch.created_at).toLocaleString('ru'):'';
      h+='<div class="pv-comment pv-comment-child" data-cid="'+ch.id+'"><img src="'+cav+'" alt=""><div class="pv-comment-body"><span class="pv-comment-user">'+(cu.login||'?')+'</span><span class="pv-comment-time">'+ctime+'</span><div class="pv-comment-text">'+escapeHtml(ch.content||'')+'</div></div></div>';
    }
  }
  return h;
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function submitComment(pid){
  var input=document.getElementById('pv-comment-input');if(!input)return;
  var text=input.value.trim();if(!text){toast('Напишите комментарий',true);return}
  var body={post_id:pid,content:text};if(currentReplyTo)body.parent_id=currentReplyTo;
  api('/comments',{method:'POST',body:JSON.stringify(body)}).then(function(){
    input.value='';currentReplyTo=null;var rep=document.getElementById('pv-replying');if(rep)rep.style.display='none';
    loadComments(pid);toast('Комментарий добавлен');
  }).catch(function(){toast('Ошибка',true)});
}

document.getElementById('pv-comments').addEventListener('click',function(e){
  var btn=e.target.closest('.pv-comment-reply');if(!btn)return;
  currentReplyTo=parseInt(btn.dataset.reply);
  var rep=document.getElementById('pv-replying');
  if(rep){rep.style.display='block';rep.innerHTML='Ответ на комментарий <span id="pv-cancel-reply">отмена</span>';
    document.getElementById('pv-cancel-reply').addEventListener('click',function(){currentReplyTo=null;rep.style.display='none'});
  }
  var input=document.getElementById('pv-comment-input');if(input)input.focus();
});

document.getElementById('cr-submit').addEventListener('click',function(){
  if(!user)return;
  var cat=document.querySelector('.cat-btn.active').dataset.cat;
  var title=document.getElementById('cr-title').value.trim();
  var text=document.getElementById('cr-text').value.trim();
  if(!title){toast('Укажите название',true);return}
  if(cat==='manual'){
    if(!text){toast('Напишите текст мануала',true);return}
    api('/posts',{method:'POST',body:JSON.stringify({category:'manual',title:title,content:text})}).then(function(r){if(!r.ok)throw 0;toast('Опубликовано!');document.getElementById('create-panel').classList.remove('open');loadFeed()}).catch(function(){toast('Ошибка',true)});
  }else{
    if(!text&&!currentFiles.length){toast('Добавьте контент',true);return}
    document.getElementById('cr-submit').disabled=true;document.getElementById('cr-submit').textContent='Загрузка...';
    var done=0,mediaUrl='',mediaType='',total=currentFiles.length||1;
    function afterAll(){if(done<total)return;api('/posts',{method:'POST',body:JSON.stringify({category:'other',title:title,content:text,media:mediaUrl,media_type:mediaType})}).then(function(r){if(!r.ok)throw 0;toast('Отправлено на модерацию');document.getElementById('create-panel').classList.remove('open');document.getElementById('cr-submit').disabled=false;document.getElementById('cr-submit').textContent='Опубликовать';loadFeed()}).catch(function(){toast('Ошибка',true);document.getElementById('cr-submit').disabled=false;document.getElementById('cr-submit').textContent='Опубликовать'})}
    if(currentFiles.length){var f=currentFiles[0],reader=new FileReader();reader.onload=function(e){resizeImage(e.target.result,600,450,0.7,function(d){mediaUrl=d;mediaType=f.type.indexOf('video')===0?f.type:'image/webp';done++;afterAll()})};reader.readAsDataURL(f)}else{afterAll()}
  }
});

function loadAdminTab(tab){
  var el=document.getElementById('admin-content');
  if(tab==='moderation'){
    api('/admin/pending').then(function(r){return r.json()}).then(function(rows){
      if(!rows||!rows.length){el.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.15);font-weight:300;padding:40px 0">Нет постов на модерации</div>';return}
      var ids=[];for(var i=0;i<rows.length;i++)if(rows[i].user_id)ids.push(rows[i].user_id);
      fetchUsers(ids,function(uMap){
        var h='';for(var i=0;i<rows.length;i++){
          var p=rows[i],u=uMap[p.user_id]||{};var text=(p.content||'').substring(0,200);
          h+='<div class="admin-card"><div class="ac-label">'+(u.login||'?')+' — '+p.title+'</div><div class="ac-sub">'+text+'</div><div class="ac-row"><button class="ac-btn green" onclick="adminApprove('+p.id+')">Принять</button><button class="ac-btn red" onclick="adminReject('+p.id+')">Отклонить</button></div></div>';
        }
        el.innerHTML=h;
      });
    }).catch(function(){el.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.15);padding:40px 0">Ошибка</div>'});
  }else if(tab==='users'){
    api('/admin/users').then(function(r){return r.json()}).then(function(rows){
      if(!rows||!rows.length){el.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.15);padding:40px 0">Нет пользователей</div>';return}
      var h='';for(var i=0;i<rows.length;i++){
        var u=rows[i];h+='<div class="admin-card"><div class="ac-label">'+u.login+'</div><div class="ac-row">';
        h+='<button class="ac-btn blue" onclick="adminShowPass('+u.id+',\''+u.login+'\')">Пароль</button>';
        h+='<button class="ac-btn gray" onclick="adminToggleAdmin('+u.id+')">Админ</button>';
        h+='<button class="ac-btn red" onclick="adminBanUser('+u.id+',\''+u.login+'\')">Бан</button></div></div>';
      }
      el.innerHTML=h;
    }).catch(function(){el.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.15);padding:40px 0">Ошибка</div>'});
  }else if(tab==='bans'){
    api('/admin/bans').then(function(r){return r.json()}).then(function(rows){
      if(!rows||!rows.length){el.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.15);padding:40px 0">Нет банов</div>';return}
      var ids=[];for(var i=0;i<rows.length;i++)if(rows[i].user_id)ids.push(rows[i].user_id);
      fetchUsers(ids,function(uMap){
        var h='';for(var i=0;i<rows.length;i++){
          var b=rows[i],u=uMap[b.user_id]||{};
          h+='<div class="admin-card"><div class="ac-label">'+(u.login||b.ip||'?')+'</div><div class="ac-sub">'+(b.reason||'')+'</div><div class="ac-row"><button class="ac-btn green" onclick="adminUnban('+b.id+')">Разбанить</button></div></div>';
        }
        el.innerHTML=h;
      });
    }).catch(function(){el.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.15);padding:40px 0">Ошибка</div>'});
  }else if(tab==='logs'){
    api('/admin/logs').then(function(r){return r.json()}).then(function(rows){
      if(!rows||!rows.length){el.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.15);padding:40px 0">Нет логов</div>';return}
      var ids=[];for(var i=0;i<rows.length;i++)if(rows[i].user_id)ids.push(rows[i].user_id);
      fetchUsers(ids,function(uMap){
        var h='';for(var i=0;i<rows.length;i++){
          var l=rows[i],u=uMap[l.user_id]||{};var time=l.created_at?new Date(l.created_at).toLocaleString('ru'):'';
          h+='<div class="admin-card"><div class="ac-label">'+(u.login||'?')+' — '+l.action+'</div><div class="ac-sub">'+l.device+'</div><div class="ac-sub">'+time+'</div></div>';
        }
        el.innerHTML=h;
      });
    }).catch(function(){el.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.15);padding:40px 0">Ошибка</div>'});
  }
}

};
window.adminShowPass=function(id,login){
  api('/admin/users/'+id+'/password').then(function(r){return r.json()}).then(function(d){if(d)alert(login+': '+d.password)}).catch(function(){toast('Ошибка',true)});
};
window.adminToggleAdmin=function(id){
  api('/admin/admins',{method:'POST',body:JSON.stringify({user_id:id})}).then(function(r){return r.json()}).then(function(d){
    if(d.error==='removed'){loadAdminTab('users');toast('Админка снята')}
    else{loadAdminTab('users');toast('Админка выдана')}
  }).catch(function(){toast('Ошибка',true)});
};
window.adminBanUser=function(id,login){
  var reason=prompt('Причина бана '+login+':');if(reason===null)return;
  api('/admin/bans',{method:'POST',body:JSON.stringify({user_id:id,reason:reason})}).then(function(r){return r.json()}).then(function(d){
    if(d.error){toast(d.error,true);return}
    loadAdminTab('users');toast(login+' забанен');
  }).catch(function(){toast('Ошибка',true)});
};
window.adminUnban=function(id){
  api('/admin/bans/'+id,{method:'DELETE'}).then(function(){loadAdminTab('bans');toast('Разбанен')}).catch(function(){toast('Ошибка',true)});
};

api('/auth/me').then(function(r){if(!r.ok)return;return r.json()}).then(function(u){if(u)enterApp(u)}).catch(function(){});
})();
</script>
